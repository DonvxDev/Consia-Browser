name: Build & Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach .exe to'
        required: false
        default: 'v0.0.0.1-KDICLM'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build renderer + Electron main
        run: pnpm run build

      - name: List build outputs
        run: |
          echo "=== dist/ ==="
          dir dist /s /b 2>nul || echo "(empty)"
          echo "=== dist-electron/ ==="
          dir dist-electron /s /b 2>nul || echo "(empty)"
        shell: cmd

      - name: Package Windows installer
        run: npx electron-builder --win --x64 --publish never
        env:
          DEBUG: electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List release output
        if: always()
        run: dir release /s /b 2>nul || echo "(no release folder)"
        shell: cmd

      - name: Upload Consia_Pcsetup.exe to release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: release/**/*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
